services:
  dst:
    image: dst
    command: ["./dst_servers.sh", "install"]
    build:
      dockerfile: ./Dockerfile
    volumes:
      - ./dontstarvetogether_dedicated_server:/root/dontstarvetogether_dedicated_server
    pull_policy: "build"

  dst_master:
    image: dst
    command: ["./dst_servers.sh", "run", "Master"]
    network_mode: "host"
    volumes:
      - ./MyDediServer:/root/.klei/DoNotStarveTogether/MyDediServer
      - ./dontstarvetogether_dedicated_server:/root/dontstarvetogether_dedicated_server
      - ./dedicated_server_mods_setup.lua:/root/dontstarvetogether_dedicated_server/mods/dedicated_server_mods_setup.lua:ro
    depends_on:
      dst:
        condition: service_completed_successfully

  dst_caves:
    image: dst
    command: ["./dst_servers.sh", "run", "Caves"]
    network_mode: "host"
    volumes:
      - ./MyDediServer:/root/.klei/DoNotStarveTogether/MyDediServer
      - ./dontstarvetogether_dedicated_server:/root/dontstarvetogether_dedicated_server
      - ./dedicated_server_mods_setup.lua:/root/dontstarvetogether_dedicated_server/mods/dedicated_server_mods_setup.lua:ro
    depends_on:
      dst:
        condition: service_completed_successfully
      dst_master:
        condition: service_started
